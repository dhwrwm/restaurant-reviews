services:
  - type: web
    name: restaurant-reviews-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api exec prisma generate &&
      pnpm turbo run build --filter=api...
    preDeployCommand: pnpm --filter api exec prisma migrate deploy
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: WEB_URL
        sync: false
