services:
  - type: web
    name: restaurant-reviews-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildFilter:
      paths:
        - apps/api/**
        - packages/types/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - render.yaml
    buildCommand: >-
      npm install -g pnpm@8.6.2 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api exec prisma generate &&
      pnpm --filter types build &&
      pnpm --filter api build
    startCommand: >-
      pnpm --filter api exec prisma migrate deploy &&
      pnpm --filter api start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: WEB_URL
        sync: false
